name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,analysis]"

      - name: Download NLTK corpora (used by Metrik-4 / Metrik-5)
        run: |
          python -m nltk.downloader -d /usr/share/nltk_data wordnet omw-1.4

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Smoke-test the CLI entry point
        run: python -m domain_model_metrics.compare --self-test